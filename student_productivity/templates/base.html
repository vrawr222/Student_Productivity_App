{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Student Productivity</title>

    <!-- ❌ REMOVE Bootstrap (causes conflicts) -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body class="{% block body_class %}{% endblock %}">

<div class="right-panel">

    <!-- 🌸 Cute Navbar -->
    <div class="cute-navbar">
        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/pomodoro">Pomodoro</a>
        <a href="/flashcards">Flashcards</a>
    </div>

    <!-- 🍓 Welcome Card -->
    <div class="dashboard-card">
        {% block content %}{% endblock %}
    </div>

    <!-- 👤 User Info -->
    <div class="user-box">
        {% if user.is_authenticated %}
            <span>Hello {{ user.username }} !!</span>
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/login/">Login</a>
        {% endif %}
    </div>

</div>

</body>
</html>
