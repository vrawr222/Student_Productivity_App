{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>TASKS</title>
    <style>
      .todo-card{
        height:500px;
        display:flex;
        flex-direction:column;
      }

      .todo-header{
        position:sticky;
        top:0;
        padding:10px;
        border-radius:20px;
        z-index:10;
      }

      .task-scroll{
        overflow-y:auto;
        margin-top:10px;
      }

      .btn, .btn-small{
        background-color: rgb(189, 143, 108);;
        text-decoration:none;
        color:black;
        padding:8px 20px;
        border-radius:10px;
        margin:2px;
      }
      body{
        margin:0;
        padding:0;
        font-family:'Comic Sans MS', cursive;
        background-size:cover;
      }
      .container{
        width:70%;
        margin:120px auto;
        padding:30px;
        border-radius:25px;
        box-shadow:0px 8px 20px rgba(0,0,0,0.2)
      }
      h1,h2,h3{
        text-align:center;
        color:rgb(189, 143, 108);
      }
      h1{
        font-size: 40px;
      }
      input[type="checkbox"]{
          transform: scale(1.8);
          margin-right: 8px;
          vertical-align: middle;
      }
      a{
        color:black;
        padding:8px 15px;
        border-radius:12px;
        font-size:14px;
      }
      a:hover{
        background:#eae9e8d3;
      }
      table{
        width:90%;
        border-color:black;
        margin-top:70px;
      }
      td,th{
        padding:12px;
        text-align:center;
        border-color:black;
      }
      td{
          font-size: 22px;
      }
      th{
        background-color: rgb(189, 143, 108);;
      }
      a, button{
          font-size: 18px;
      }
      body{
          font-size: 20px;
      }
      input,textarea,select{
        width:100%;
        padding:10px;
        border-radius:10px;
        border:1px solid;
      }
      button{
        color:rgb(13, 13, 13);
        border:none;
        padding: 10px 30px;
        border-radius:15px;
        cursor:pointer;
      }
      button:hover{
        background:rgba(216, 207, 207, 0.901);
      }
      .top-btn{
        text-align:center;
        margin-bottom:20px;
      }
    </style>
  </head>
  <body style="
background: url('{% static 'images/app_bg.jpg' %}') no-repeat center center fixed;
background-size: cover;
">
    <div class="container">
      {% block content %}
      {% endblock %}
    </div>
  </body>
</html>
