{% extends 'base.html' %}
{% load static %}

{% block body_class %}other-bg{% endblock %}

{% block content %}
<h2>Create Flashcard</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="question" placeholder="Question"><br><br>
    <textarea name="answer" placeholder="Answer"></textarea><br><br>
    <button type="submit">Save</button>
</form>

{% endblock %}
